<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · RIFCORE®</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--deep:#111;--surface:#181818;--border:#272727;--accent:#f0c040;--accent2:#e05520;--white:#f5f5f0;--muted:#787870;--text:#ccc8c0;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:hidden}

/* Animated background */
.bg-text{position:fixed;font-family:'Bebas Neue',sans-serif;font-size:40vw;color:rgba(255,255,255,.015);line-height:1;user-select:none;pointer-events:none;z-index:0;animation:float 8s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

.content{position:relative;z-index:1;max-width:540px}

.err-code{font-family:'Bebas Neue',sans-serif;font-size:clamp(100px,20vw,180px);line-height:.9;color:var(--white);letter-spacing:4px;margin-bottom:0}
.err-code span{color:var(--accent)}
.err-line{width:60px;height:3px;background:var(--accent);margin:16px auto}
.err-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,5vw,40px);color:var(--white);letter-spacing:3px;margin-bottom:12px}
.err-sub{font-size:14px;color:var(--muted);font-weight:300;line-height:1.7;margin-bottom:32px;max-width:380px;margin-left:auto;margin-right:auto}

.err-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.btn-primary{background:var(--accent);color:var(--black);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:14px 28px;text-decoration:none;transition:all .25s;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.btn-primary:hover{background:var(--white);transform:translateY(-2px)}
.btn-ghost{border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:14px 28px;text-decoration:none;transition:all .25s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

.quick-links{border-top:1px solid var(--border);padding-top:24px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.quick-links a{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.quick-links a:hover{color:var(--accent)}

.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:5px;color:var(--white);margin-bottom:48px;text-decoration:none;display:block}
.logo span{color:var(--accent)}

/* Countdown */
.countdown{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--border);margin-top:20px}
.countdown span{color:var(--accent)}
</style>
</head>
<body>

<div class="bg-text">404</div>

<div class="content">
  <a href="index.html" class="logo">RIF<span>CORE</span>®</a>

  <div class="err-code">4<span>0</span>4</div>
  <div class="err-line"></div>
  <div class="err-title">Page Not Found</div>
  <p class="err-sub">
    The page you're looking for doesn't exist or has been moved.
    Let's get you back on track.
    <br><br>
    <em style="font-size:12px;color:var(--border)">La page que vous cherchez n'existe pas. · De pagina die u zoekt bestaat niet.</em>
  </p>

  <div class="err-links">
    <a href="index.html" class="btn-primary">← Back to Store</a>
    <a href="tracking.html" class="btn-ghost">📦 Track Order</a>
  </div>

  <div class="quick-links">
    <a href="index.html#gallery">Gallery</a>
    <a href="index.html#features">Features</a>
    <a href="index.html#buy">Order</a>
    <a href="legal.html">Legal</a>
  </div>

  <div class="countdown">Auto-redirect in <span id="count">10</span>s</div>
</div>

<script>
let n = 10;
const el = document.getElementById('count');
const t = setInterval(()=>{
  n--;
  el.textContent = n;
  if(n <= 0){ clearInterval(t); window.location.href = 'index.html'; }
}, 1000);
</script>
</body>
</html>
